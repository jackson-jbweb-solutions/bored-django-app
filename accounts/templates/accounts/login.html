{% extends "tasks/base.html" %}
{% block content %}
<div class="min-h-[80vh] flex items-center justify-center">
    <div class="w-full max-w-sm bg-slate-900 border border-slate-800 rounded-xl shadow-xl p-8">
        <h2 class="text-xl font-semibold text-white mb-1">Sign In</h2>
        <p class="text-sm text-slate-400 mb-6">
            Don't have an account?
            <a href="{% url 'register' %}" class="text-indigo-400 hover:text-indigo-300">Register</a>
        </p>

        <form method="POST" action="{% url 'login' %}">
            {% csrf_token %}
            {% if request.GET.next %}
            <input type="hidden" name="next" value="{{ request.GET.next }}">
            {% endif %}
            {% if form.errors %}
            <div class="bg-red-900/30 border border-red-700 text-red-400 rounded-md px-4 py-3 text-sm mb-4">
                Invalid username or password.
            </div>
            {% endif %}

            <div class="space-y-4">
                <div>
                    <label for="{{ form.username.id_for_label }}" class="block text-sm font-medium text-slate-300 mb-1.5">Username</label>
                    {{ form.username }}
                </div>
                <div>
                    <label for="{{ form.password.id_for_label }}" class="block text-sm font-medium text-slate-300 mb-1.5">Password</label>
                    {{ form.password }}
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-full justify-center mt-6">
                Sign In
            </button>
        </form>
    </div>
</div>
{% endblock %}
