{% extends "tasks/base.html" %}
{% block content %}

<div class="flex items-center justify-between mb-6">
    <h1 class="text-2xl font-semibold text-white">Tasks</h1>
    <button
        hx-get="/tasks/create/"
        hx-target="#task-form-container"
        hx-swap="innerHTML"
        class="btn btn-primary">
        + Add Task
    </button>
</div>

<div id="task-form-container"></div>

<div class="bg-slate-900 border border-slate-800 rounded-lg overflow-hidden">
    <table class="task-table">
        <thead>
            <tr>
                <th class="w-10"></th>
                <th>Task</th>
                <th>Created</th>
                <th>Created By</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="task-list">
            {% for task in tasks %}
                {% include "tasks/task_row.html" %}
            {% empty %}
            <tr>
                <td colspan="5" class="text-center text-slate-500! py-10">No tasks yet. Add one above!</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

{% endblock %}
