<tr id="cushion-{{ cushion.id }}">
    <td colspan="7">
        <form
            hx-post="/assets/cushions/{{ cushion.id }}/edit/"
            hx-target="#cushion-{{ cushion.id }}"
            hx-swap="outerHTML"
            class="task-form task-form--inline">
            {% csrf_token %}
            <div class="form-group">{{ form.serial_number }}</div>
            <div class="form-group">{{ form.make }}</div>
            <div class="form-group">{{ form.model }}</div>
            <div class="form-group">{{ form.purchase_date }}</div>
            <div class="form-group">{{ form.status }}</div>
            <div class="form-group">{{ form.ward }}</div>
            <div class="form-group basis-full">{{ form.notes }}</div>
            <div class="form-actions">
                <button type="submit" class="btn btn-primary btn-sm">Save</button>
                <button
                    type="button"
                    hx-get="/assets/cushions/{{ cushion.id }}/row/"
                    hx-target="#cushion-{{ cushion.id }}"
                    hx-swap="outerHTML"
                    class="btn btn-ghost btn-sm">
                    Cancel
                </button>
            </div>
        </form>
    </td>
</tr>
