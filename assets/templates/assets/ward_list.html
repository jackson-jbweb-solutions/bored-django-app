{% extends "assets/base.html" %}
{% block content %}

<div class="flex items-center justify-between mb-6">
    <h1 class="text-2xl font-semibold text-white">Wards</h1>
    <button
        hx-get="/assets/wards/create/"
        hx-target="#ward-form-container"
        hx-swap="innerHTML"
        class="btn btn-primary">
        + Add Ward
    </button>
</div>

<div id="ward-form-container"></div>

<div class="bg-slate-900 border border-slate-800 rounded-lg overflow-hidden">
    <table class="task-table">
        <thead>
            <tr>
                <th>Name</th>
                <th>Created</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="ward-list">
            {% for ward in wards %}
                {% include "assets/ward_row.html" %}
            {% empty %}
                <tr><td colspan="3" class="text-center text-slate-500! py-10">No wards yet. Add one above!</td></tr>
            {% endfor %}
        </tbody>
    </table>
</div>

{% endblock %}
